info:
  name: Create todo
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:5266/todo
  body:
    type: json
    data: |-
      {
        "item": {
          "title": "{{$randomCatchPhraseNoun}}",
          "description": "{{$randomCatchPhrase}}",
          "isCompleted": {{$randomBoolean}}
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
